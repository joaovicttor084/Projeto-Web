<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Serviço - FAXINO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-feed.css">
</head>
<body class="feed-page">
    <main class="container-feed">
        <header style="margin-bottom: 20px;">
            <button onclick="window.location.href='feed.html'" style="background: none; border: none; color: #764ba2; font-size: 1rem; cursor: pointer; font-weight: bold;">
                Voltar para o Feed
            </button>
        </header>
        <div class="service-card" style="cursor: default; transform: none; border-color: transparent;">
            <div class="card-header">
                <h3 class="user-name">Maria Silva</h3>
                <span class="service-price">R$150,00</span>
            </div>
            <p class="user-city">São Paulo</p>
            <h4 class="service-title">Faxina Completa</h4>
            <p class="service-desc" style="margin-bottom: 20px;">Limpeza Pesada de apartamento até 70m², incluso limpeza de vidros. Levo os meus próprios produtos de limpeza.</p>
            <button id="btn-whatsapp" style="width: 100%; background-color: #25D366; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;">
                Falar no WhatsApp
            </button>
        </div>
    </main>
    <script src="script-detalhes.js"></script>
</body>
</html>
