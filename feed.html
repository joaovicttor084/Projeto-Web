<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Serviços</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-feed.css">
</head>
<body class="feed-page">  
    <main class="container-feed">
        <header class="search-header">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Buscar serviços...">
            </div>
            <button id="btn-toggle-filtro" class="btn-filter">Filtros</button>
        </header>
        <div id="filter-panel" class="filter-panel">
            <div class="filter-row">
                <input type="number" placeholder="R$ Mín.">
                <input type="number" placeholder="R$ Max.">
            </div>
            <input type="text" placeholder="Cidade">
            <select>
                <option value="">Selecione um Serviço</option>
                <option value="faxina">Faxina</option>
                <option value="cozinha">Cozinheira(o)</option>
            </select>
            <button id="btn-aplicar">Aplicar Filtros</button>
        </div>
        <section class="feed-list">
            <div class="service-card" onclick="verDetalhes('1')">
                <div class="card-header">
                    <h3 class="user-name">Maria Silva</h3>
                    <span class="service-price">R$150,00</span>
                </div>
                <p class="user-city">São Paulo - SP</p>
                <h4 class="service-title">Faxina Completa</h4>
                <p class="service-desc">Limpeza pesada de apartamentos até 70m², incluso limpeza de vidros.</p>
            </div>
            <div class="service-card" onclick="verDetalhes('1')">
                <div class="card-header">
                    <h3 class="user-name">João Souza</h3>
                    <span class="service-price">R$200,00</span>
                </div>
                <div class="user-city">Campinas - SP</div>
                <h4 class="service-title">Reparos Elétricos</h4>
                <p class="service-desc">Troca de chuveiros, tomadas e fiação residencial.</p>
            </div>
        </section>
    </main>
    <nav class="bottom-nav">
        <a href="feed.html" class="nav-item">
            <span class="icon">🏠</span>
            <span class="label">Início</span>
        </a>
        <a href="publicar.html" class="nav-item center-btn" style="flex-shrink: 0;">
            <span class="icon" style="font-size: 1.8rem; margin: 0;">➕</span>
        </a>
        <a href="perfil.html" class="nav-item active">
            <span class="icon">👤</span>
            <span class="label">Perfil</span>
        </a>
    </nav>
    <div style="height: 80px;"></div>
    <script src="script-feed.js"></script>
</body>
</html>
